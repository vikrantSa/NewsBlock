<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hey. Not Now.</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #ffffff;
      --border: #e8e8e8;
      --text-primary: #111111;
      --text-muted: #666666;
      --text-soft: #555555;
      --accent: #d0021b;
    }

    body {
      background: var(--bg);
      color: var(--text-primary);
      font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    .container {
      max-width: 560px;
      width: 100%;
      text-align: center;
      animation: fadeIn 0.5s ease both;
    }

    .clock {
      font-size: 0.78rem;
      letter-spacing: 0.18em;
      color: var(--text-muted);
      margin-bottom: 2.5rem;
      text-transform: uppercase;
      font-variant-numeric: tabular-nums;
    }

    /* Big counter — the gut-punch */
    .counter-number {
      font-size: clamp(6rem, 18vw, 10rem);
      font-weight: 900;
      line-height: 1;
      color: var(--accent);
      letter-spacing: -0.04em;
    }

    .counter-label {
      font-size: 0.72rem;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-top: 0.4rem;
      margin-bottom: 2.75rem;
    }

    /* Headline */
    .headline {
      font-size: clamp(1.9rem, 5vw, 2.8rem);
      font-weight: 800;
      line-height: 1.15;
      letter-spacing: -0.025em;
      color: var(--text-primary);
      margin-bottom: 1rem;
    }

    .subtext {
      font-size: 0.97rem;
      color: var(--text-soft);
      line-height: 1.8;
      margin-bottom: 2.75rem;
    }

    .divider {
      width: 32px;
      height: 1px;
      background: var(--border);
      margin: 0 auto 2.5rem;
    }

    /* Question */
    .question {
      font-size: 0.97rem;
      font-weight: 600;
      color: var(--text-primary);
      margin-bottom: 0.75rem;
    }

    .question-input {
      width: 100%;
      border: none;
      border-bottom: 1.5px solid var(--border);
      padding: 0.5rem 0;
      font-size: 0.95rem;
      color: var(--text-primary);
      background: transparent;
      outline: none;
      text-align: center;
      font-family: inherit;
      margin-bottom: 2.75rem;
      transition: border-color 0.2s;
    }

    .question-input::placeholder { color: #bbb; }
    .question-input:focus { border-color: #aaa; }

    /* Countdown */
    .countdown-hint {
      font-size: 0.78rem;
      color: var(--text-muted);
      letter-spacing: 0.03em;
      margin-bottom: 1rem;
      min-height: 1.2em;
      transition: opacity 0.4s;
    }

    /* Close button */
    .btn-close {
      display: inline-block;
      padding: 0.85rem 2.5rem;
      border: 1.5px solid #d8d8d8;
      border-radius: 4px;
      font-size: 0.8rem;
      color: #bbb;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      cursor: not-allowed;
      background: transparent;
      font-family: inherit;
      min-width: 200px;
      transition: border-color 0.3s, color 0.3s;
    }

    .btn-close.ready {
      cursor: pointer;
      border-color: #aaa;
      color: #444;
    }

    .btn-close.ready:hover {
      border-color: #111;
      color: #111;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
  <div class="container">

    <div class="clock" id="clock">--:-- --</div>

    <div class="counter-number" id="session-count">—</div>
    <div class="counter-label">times you've been here today</div>

    <h1 class="headline">You're not curious.<br>You're avoiding.</h1>

    <p class="subtext">
      This isn't about the news.<br>
      You're chasing a dopamine hit — and you know it.
    </p>

    <div class="divider"></div>

    <p class="question">What were you doing before this?</p>
    <input
      class="question-input"
      id="task-input"
      type="text"
      placeholder="type it out..."
      autocomplete="off"
      spellcheck="false"
    />

    <p class="countdown-hint" id="countdown-hint">
      Sit with it. Closing in <strong id="countdown">10</strong>s.
    </p>
    <button class="btn-close" id="btn-close" disabled onclick="window.close()">
      CLOSE TAB
    </button>

  </div>

  <script>
    // Clock
    function updateClock() {
      const now = new Date();
      const h = now.getHours();
      const m = String(now.getMinutes()).padStart(2, '0');
      const ampm = h >= 12 ? 'PM' : 'AM';
      const h12 = h % 12 || 12;
      document.getElementById('clock').textContent = `${h12}:${m} ${ampm}`;
    }
    updateClock();
    setInterval(updateClock, 10000);

    // Session counter
    function getTodayKey() {
      const d = new Date();
      return `nb_count_${d.getFullYear()}_${d.getMonth()}_${d.getDate()}`;
    }
    const key = getTodayKey();
    const prev = parseInt(localStorage.getItem(key) || '0', 10);
    const next = prev + 1;
    localStorage.setItem(key, next);
    document.getElementById('session-count').textContent = next;

    // Countdown — 10 seconds before close button unlocks
    let remaining = 10;
    const btn = document.getElementById('btn-close');
    const countEl = document.getElementById('countdown');
    const hintEl = document.getElementById('countdown-hint');

    const timer = setInterval(() => {
      remaining--;
      if (remaining <= 0) {
        clearInterval(timer);
        btn.classList.add('ready');
        btn.disabled = false;
        hintEl.textContent = "You can leave now. But the urge has probably already passed.";
      } else {
        countEl.textContent = remaining;
      }
    }, 1000);
  </script>
</body>
</html>
